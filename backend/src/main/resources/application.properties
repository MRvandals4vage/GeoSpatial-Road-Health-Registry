spring.application.name=monitor

# --- PRIMARY CONFIG: POSTGRES (Using Docker Container) ---
spring.datasource.url=jdbc:postgresql://localhost:5432/georoad
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT Configuration
jwt.secret=your_super_secret_key_which_is_long_enough_for_sha256_algorithm
jwt.expiration=86400000

# AIService URL
ai.service.url=http://localhost:8000/predict
