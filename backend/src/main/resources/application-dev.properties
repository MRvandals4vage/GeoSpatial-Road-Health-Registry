spring.datasource.url=jdbc:h2:mem:georoad;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true

# Data Seeding
# Hibernate automatically runs import.sql on startup if ddl-auto is create or create-drop
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=never

# JWT & AI (Shared)
jwt.secret=your_super_secret_key_which_is_long_enough_for_sha256_algorithm
jwt.expiration=86400000
ai.service.url=http://localhost:8000/predict
