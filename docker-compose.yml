version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3
    platform: linux/amd64
    container_name: georoad-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=georoad
    ports:
      - "5432:5432"
    volumes:
      - georoad_data:/var/lib/postgresql/data

volumes:
  georoad_data:
